<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Curso de Inglťs - Reproductor con Memoria</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e293b;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: #0f172a;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        .player-section {
            flex: 2;
            min-width: 300px;
        }
        .playlist-section {
            flex: 1;
            min-width: 260px;
            background: #1e293b;
            border-radius: 20px;
            padding: 15px;
            height: fit-content;
        }
        video {
            width: 100%;
            border-radius: 16px;
            background: black;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .video-info {
            margin-top: 15px;
            background: #334155;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: bold;
            display: inline-block;
            color: #f1f5f9;
        }
        .playlist {
            list-style: none;
            padding: 0;
            margin: 20px 0 0;
            max-height: 500px;
            overflow-y: auto;
        }
        .playlist li {
            background: #334155;
            margin-bottom: 8px;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #e2e8f0;
        }
        .playlist li:hover {
            background: #475569;
            transform: translateX(3px);
        }
        .playlist li.active {
            background: #3b82f6;
            border-left: 4px solid #facc15;
        }
        .progress-badge {
            font-size: 11px;
            background: #0f172a;
            padding: 4px 8px;
            border-radius: 20px;
            font-family: monospace;
            color: #94a3b8;
        }
        button {
            background: #facc15;
            border: none;
            color: #0f172a;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
        }
        button:hover {
            background: #eab308;
            transform: scale(1.02);
        }
        .status {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 10px;
            background: #1e293b;
            padding: 8px 12px;
            border-radius: 20px;
        }
        h2, h3 {
            color: #f1f5f9;
            margin-top: 0;
        }
        .footer-note {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            margin-top: 20px;
        }
        hr {
            border-color: #334155;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="player-section">
        <video id="miVideo" controls preload="metadata"></video>
        <div class="video-info" id="videoNombre">?? Ningķn video cargado</div>
        <div class="status" id="estadoProgreso">? Listo. Selecciona un video.</div>
        <button id="reiniciarVideo">? Reiniciar este video</button>
    </div>
    <div class="playlist-section">
        <h3>?? Lecciones (39 al 58)</h3>
        <ul class="playlist" id="listaVideos"></ul>
        <hr>
        <div class="footer-note">
            ?? El progreso se guarda automŠticamente cada 5 segundos y al pausar.<br>
            ?? Al recargar la pŠgina, seguirŠs en el mismo video y segundo.
        </div>
    </div>
</div>

<script>
    // ------------------------------------------------------------
    // 1. LISTA DE VIDEOS CON SUS IDs DE GOOGLE DRIVE
    // (ya incluidos segķn los enlaces que proporcionaste)
    // ------------------------------------------------------------
    const videos = [
        { nombre: "Lecciůn 39", driveId: "1exv8NGSbUR_WH-tFGYTRvy-AvnK7jox1" },
        { nombre: "Lecciůn 40", driveId: "1oDHYbLdMCodHltJWHGRmPDZa91yixOcH" },
        { nombre: "Lecciůn 41", driveId: "1Y3C2E4fQ7T5kU95iZyqwEFHOzhsScUWY" },
        { nombre: "Lecciůn 42", driveId: "1NaTQgow58cW7r4S7aczYOHX6iD3JsubK" },
        { nombre: "Lecciůn 43", driveId: "1czyYMJkrq5Vsx2vkIbHqF5jEIXlxBNHg" },
        { nombre: "Lecciůn 44", driveId: "1loKDVCcOmNOFDgbKXpbXYOqDT1fR4M1b" },
        { nombre: "Lecciůn 45", driveId: "16cHwrg5bAy2304BM5yrz03udyvgINyBr" },
        { nombre: "Lecciůn 46", driveId: "1SBnsELi0oq5XpTRuaRYR3sm_Y0E3BmDP" },
        { nombre: "Lecciůn 47", driveId: "1D7V_29PxCS4XchEDdzdzA-sELAOIVjT-" },
        { nombre: "Lecciůn 48", driveId: "1qC5af2nc86BVjYtWZGgU62PjxPsk_3Sb" },
        { nombre: "Lecciůn 49", driveId: "1ntskbFCBOEpguiiqkE-oR96Ie96us9Bv" },
        { nombre: "Lecciůn 50", driveId: "12__LPjbKyeA9c7QX00ufbRwNFXcGWieI" },
        { nombre: "Lecciůn 51", driveId: "1NN80jeD2O2ZsD9-QMFg5Z4cmYobh-eZM" },
        { nombre: "Lecciůn 52", driveId: "13z8PaAIltpI2LuR2OFKhf1gGtbf6xzbx" },
        { nombre: "Lecciůn 53", driveId: "1ztF_NyUlAUUDzG_QXhUhQmKQ2VOB0pll" },
        { nombre: "Lecciůn 54", driveId: "1awAt29j44CdnlbI2H0OhvErLvmskfcu1" },
        { nombre: "Lecciůn 55", driveId: "1CK-HuTYxd1faaM98JgdUMrNGrsSYM28f" },
        { nombre: "Lecciůn 56", driveId: "1tdnpZmHMWkP1hxtRgWjy_Mr7o-5GVaEI" },
        { nombre: "Lecciůn 57", driveId: "1P16K6UmlVuFqqyplp3pF_cebyOPtHvbM" },
        { nombre: "Lecciůn 58", driveId: "1CZBD-q9Nw6HE_ZDwIoEa8BFpdOUFj0KC" }
    ];

    // ------------------------------------------------------------
    // 2. FUNCI”N PARA OBTENER LA URL DIRECTA DEL VIDEO DESDE DRIVE
    // (formato que probamos que funciona: uc?export=view)
    // ------------------------------------------------------------
    function obtenerUrlVideo(driveId) {
        return `https://drive.google.com/uc?export=view&id=${driveId}`;
    }

    // ------------------------------------------------------------
    // 3. VARIABLES GLOBALES Y ELEMENTOS DEL DOM
    // ------------------------------------------------------------
    let video = document.getElementById('miVideo');
    let indiceActual = -1;          // Ūndice del video que se estŠ reproduciendo
    let guardarTimeout = null;

    // ------------------------------------------------------------
    // 4. FUNCIONES DE ALMACENAMIENTO (localStorage)
    // ------------------------------------------------------------
    // Guardar progreso de un video especŪfico (por Ūndice)
    function guardarProgresoVideo(indice, segundos) {
        if (indice === undefined || indice < 0) return;
        let progresos = JSON.parse(localStorage.getItem('progresos_videos')) || {};
        progresos[indice] = segundos;
        localStorage.setItem('progresos_videos', JSON.stringify(progresos));
        
        // Tambiťn guardar el ķltimo video visto (Ūndice)
        localStorage.setItem('ultimo_video_indice', indice);
        
        // Actualizar el badge visual en la lista
        actualizarBadge(indice, segundos);
    }
    
    // Obtener progreso guardado de un video
    function obtenerProgresoVideo(indice) {
        let progresos = JSON.parse(localStorage.getItem('progresos_videos')) || {};
        return progresos[indice] || 0;
    }
    
    // Actualizar la insignia de un solo video en la lista
    function actualizarBadge(indice, segundos) {
        const badgeSpan = document.getElementById(`badge-${indice}`);
        if (badgeSpan) {
            if (segundos > 0) {
                const mins = Math.floor(segundos / 60);
                const secs = segundos % 60;
                badgeSpan.textContent = `?? ${mins}:${secs.toString().padStart(2,'0')}`;
            } else {
                badgeSpan.textContent = `?? No visto`;
            }
        }
    }
    
    // Actualizar todos los badges al cargar la pŠgina
    function actualizarTodosLosBadges() {
        let progresos = JSON.parse(localStorage.getItem('progresos_videos')) || {};
        for (let i = 0; i < videos.length; i++) {
            let seg = progresos[i] || 0;
            actualizarBadge(i, seg);
        }
    }

    // ------------------------------------------------------------
    // 5. FUNCI”N PARA CARGAR UN VIDEO POR ÕNDICE
    // ------------------------------------------------------------
    function cargarVideo(indice) {
        if (indice < 0 || indice >= videos.length) return;
        indiceActual = indice;
        const videoData = videos[indice];
        const urlDirecta = obtenerUrlVideo(videoData.driveId);
        
        // Cambiar la fuente del reproductor
        video.src = urlDirecta;
        video.load();
        
        // Actualizar la interfaz: nombre del video y resaltado en lista
        document.getElementById('videoNombre').innerHTML = `?? ${videoData.nombre}`;
        resaltarVideoEnLista(indice);
        
        // Recuperar el progreso guardado para este video
        const segundosGuardados = obtenerProgresoVideo(indice);
        
        // Esperar a que el video pueda ser manipulado (cargar metadatos)
        function onLoadedMetadata() {
            video.removeEventListener('loadedmetadata', onLoadedMetadata);
            if (segundosGuardados > 0 && segundosGuardados < video.duration) {
                video.currentTime = segundosGuardados;
                const mins = Math.floor(segundosGuardados / 60);
                const secs = segundosGuardados % 60;
                mostrarEstado(`? Reanudando desde ${mins}:${secs.toString().padStart(2,'0')}`);
            } else {
                mostrarEstado(`?? Comenzando ${videoData.nombre}`);
            }
        }
        video.addEventListener('loadedmetadata', onLoadedMetadata);
        
        // Tambiťn guardar en el localStorage el ķltimo video (por si acaso)
        localStorage.setItem('ultimo_video_indice', indice);
    }
    
    // Resaltar el video activo en la lista y quitar resaltado de los demŠs
    function resaltarVideoEnLista(indice) {
        const items = document.querySelectorAll('.playlist li');
        items.forEach((item, i) => {
            if (i === indice) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    }
    
    // Mostrar mensajes temporales en el estado
    function mostrarEstado(mensaje) {
        const estadoDiv = document.getElementById('estadoProgreso');
        estadoDiv.innerHTML = mensaje;
        setTimeout(() => {
            if (estadoDiv.innerHTML === mensaje) {
                estadoDiv.innerHTML = '? Listo. El progreso se guarda automŠticamente.';
            }
        }, 2500);
    }
    
    // ------------------------------------------------------------
    // 6. GUARDADO AUTOMŃTICO DEL PROGRESO (cada 5 segundos y al pausar)
    // ------------------------------------------------------------
    function guardarProgresoActual() {
        if (indiceActual !== -1 && video && !isNaN(video.currentTime) && video.readyState > 0) {
            const segundos = Math.floor(video.currentTime);
            guardarProgresoVideo(indiceActual, segundos);
            // No mostramos mensaje cada vez para no saturar, solo silencioso.
        }
    }
    
    // Evento: cada vez que el tiempo cambia, agendamos guardado cada 5 segundos
    video.addEventListener('timeupdate', () => {
        if (guardarTimeout) clearTimeout(guardarTimeout);
        guardarTimeout = setTimeout(() => {
            guardarProgresoActual();
        }, 5000);
    });
    
    // Evento: al pausar, guardamos inmediatamente
    video.addEventListener('pause', () => {
        guardarProgresoActual();
        if (indiceActual !== -1) {
            const seg = Math.floor(video.currentTime);
            const mins = Math.floor(seg / 60);
            const secs = seg % 60;
            mostrarEstado(`?? Progreso guardado: ${mins}:${secs.toString().padStart(2,'0')}`);
        }
    });
    
    // Evento: antes de cerrar la pŠgina, guardar por ķltima vez
    window.addEventListener('beforeunload', () => {
        guardarProgresoActual();
    });
    
    // ------------------------------------------------------------
    // 7. CONSTRUCCI”N DE LA LISTA DE REPRODUCCI”N EN EL HTML
    // ------------------------------------------------------------
    function generarLista() {
        const contenedor = document.getElementById('listaVideos');
        contenedor.innerHTML = '';
        videos.forEach((videoItem, idx) => {
            const li = document.createElement('li');
            const spanNombre = document.createElement('span');
            spanNombre.textContent = videoItem.nombre;
            const spanBadge = document.createElement('span');
            spanBadge.className = 'progress-badge';
            spanBadge.id = `badge-${idx}`;
            spanBadge.textContent = '?? No visto';
            li.appendChild(spanNombre);
            li.appendChild(spanBadge);
            li.addEventListener('click', () => {
                cargarVideo(idx);
            });
            contenedor.appendChild(li);
        });
        // Despuťs de crear la lista, actualizamos los badges con los progresos existentes
        actualizarTodosLosBadges();
    }
    
    // ------------------------------------------------------------
    // 8. BOT”N PARA REINICIAR EL VIDEO ACTUAL
    // ------------------------------------------------------------
    document.getElementById('reiniciarVideo').addEventListener('click', () => {
        if (indiceActual !== -1 && video) {
            video.currentTime = 0;
            guardarProgresoVideo(indiceActual, 0);
            mostrarEstado(`?? Video reiniciado al principio`);
            // Actualizar badge a "No visto"
            actualizarBadge(indiceActual, 0);
        } else {
            mostrarEstado(`?? No hay video cargado`);
        }
    });
    
    // ------------------------------------------------------------
    // 9. INICIALIZAR AL CARGAR LA PŃGINA
    // ------------------------------------------------------------
    window.addEventListener('load', () => {
        generarLista();
        
        // Recuperar ķltimo video visto
        let ultimoIndice = localStorage.getItem('ultimo_video_indice');
        if (ultimoIndice !== null && !isNaN(parseInt(ultimoIndice))) {
            ultimoIndice = parseInt(ultimoIndice);
            if (ultimoIndice >= 0 && ultimoIndice < videos.length) {
                cargarVideo(ultimoIndice);
                return;
            }
        }
        // Si no hay ķltimo video o es invŠlido, cargar el primero (lecciůn 39)
        if (videos.length > 0) {
            cargarVideo(0);
        }
    });
    
    // PequeŮa ayuda: si el video falla por CORS o permisos, mostrar mensaje amigable
    video.addEventListener('error', (e) => {
        console.error('Error de video:', e);
        mostrarEstado('? No se pudo cargar el video. Puede que el profesor haya restringido la reproducciůn directa. Prueba a abrir la carpeta y compartir los enlaces como "Cualquier persona con el enlace"');
    });
</script>
</body>
</html>
